<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="application-name" content="Muestras Web">
    <meta name="apple-mobile-web-app-title" content="Muestras Web">
    <meta name="theme-color" content="#164C7C">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <title>Historial</title>
    <link rel="icon" href="../QA2026.png" type="image/png">
    <link rel="apple-touch-icon" href="../QA2026.png">
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="modulo-aux-page">

    <header>
        <div class="header-top-row">
            <h2 class="header-title">
                <span class="header-title-prefix">Módulo:</span>
                <span class="header-modulo-pill">Historial</span>
            </h2>
            <div class="header-status-card header-status-card--solo-conn is-online" id="hist-header-status" aria-live="polite" aria-label="Conexión">
                <div class="header-status-ring" aria-hidden="true">
                    <span class="header-status-ring-inner">
                        <i data-lucide="wifi" class="header-status-wifi" id="hist-header-wifi"></i>
                    </span>
                </div>
                <div class="header-status-body">
                    <div class="header-status-conn">
                        <span class="header-status-conn-dot" aria-hidden="true"></span>
                        <span class="header-status-conn-text" id="hist-conn-label">En línea</span>
                    </div>
                </div>
            </div>
        </div>
        <p class="modulo-header-desc">Registros del sistema y estado de sincronización local.</p>
    </header>

    <div class="container modulo-aux-wrap">
        <section class="hist-kpi">
            <article class="hist-kpi-card"><b id="kpi-servidor">0</b><span>Registrados en servidor</span></article>
            <article class="hist-kpi-card"><b id="kpi-pendientes">0</b><span>Pendientes por internet</span></article>
            <article class="hist-kpi-card"><b id="kpi-bloqueados">0</b><span>Duplicados / bloqueados</span></article>
        </section>

        <section class="hist-section">
            <h3 class="hist-title">Servidor (GET code.gs)</h3>
            <div id="server-list" class="hist-list"></div>
            <nav id="server-pagination" class="hist-pagination" aria-label="Paginación servidor" hidden></nav>
        </section>

        <section class="hist-section">
            <h3 class="hist-title">Sincronización local</h3>
            <div id="local-list" class="hist-list"></div>
            <nav id="local-pagination" class="hist-pagination" aria-label="Paginación sincronización local" hidden></nav>
        </section>
    </div>

    <nav id="main-bottom-nav">
        <a class="nav-btn nav-link" id="nav-campo" data-nav-index="0" href="../" aria-label="Campo">
            <i data-lucide="house"></i>
            <span>Campo</span>
        </a>
        <a class="nav-btn nav-link" id="nav-packing" data-nav-index="1" href="../packing/" aria-label="Packing">
            <i data-lucide="scan-line"></i>
            <span>Packing</span>
        </a>
        <a class="nav-btn nav-link active" id="nav-historial" data-nav-index="2" href="./" aria-label="Historial">
            <i data-lucide="clock-3"></i>
            <span>Historial</span>
        </a>
        <a class="nav-btn nav-link" id="nav-recomendaciones" data-nav-index="3" href="../recomendaciones/" aria-label="Recomendaciones">
            <i data-lucide="settings"></i>
            <span>Recom.</span>
        </a>
    </nav>

    <script src="../script.js"></script>
    <script src="../librerias/lucide.min.js"></script>
    <script src="../librerias/sweetalert2.all.min.js"></script>
    <script>
        if (window.lucide && typeof window.lucide.createIcons === 'function') {
            window.lucide.createIcons();
        }

        const API_URL = 'https://script.google.com/macros/s/AKfycbwdC1lwuGNT01xfLE_0jI31oXU13rBinYPKwlVfkZwqmIJGqSRuvPnq4-A9b6tHZThN/exec';
        const SYNC_QUEUE_KEY = 'tiempos-sync-queue-v1';
        const SYNC_HISTORY_KEY = 'tiempos-sync-history-v1';
        const HIST_PER_PAGE = 10;

        let histServerRows = [];
        let histLocalRows = [];
        let histServerPage = 0;
        let histLocalPage = 0;

        function actualizarHeaderHistorial() {
            const card = document.getElementById('hist-header-status');
            const label = document.getElementById('hist-conn-label');
            const wifi = document.getElementById('hist-header-wifi');
            const on = navigator.onLine;
            if (card) {
                card.classList.toggle('is-online', on);
                card.classList.toggle('is-offline', !on);
            }
            if (label) label.textContent = on ? 'En línea' : 'Sin internet';
            if (wifi) {
                wifi.setAttribute('data-lucide', on ? 'wifi' : 'wifi-off');
                if (window.lucide && typeof window.lucide.createIcons === 'function') {
                    window.lucide.createIcons();
                }
            }
        }

        window.addEventListener('online', () => actualizarHeaderHistorial());
        window.addEventListener('offline', () => actualizarHeaderHistorial());

        function cbJsonp(urlBase, params) {
            return new Promise((resolve, reject) => {
                const cb = '__hist_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
                const noopCb = function () { };
                const qs = new URLSearchParams(params || {});
                qs.set('callback', cb);
                const src = urlBase + (urlBase.includes('?') ? '&' : '?') + qs.toString();
                const script = document.createElement('script');
                let done = false;
                const timeoutId = setTimeout(() => {
                    if (done) return;
                    done = true;
                    window[cb] = noopCb;
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Timeout JSONP'));
                }, 12000);
                window[cb] = (payload) => {
                    if (done) return;
                    done = true;
                    clearTimeout(timeoutId);
                    window[cb] = noopCb;
                    if (script.parentNode) script.parentNode.removeChild(script);
                    resolve(payload);
                };
                script.onerror = () => {
                    if (done) return;
                    done = true;
                    clearTimeout(timeoutId);
                    window[cb] = noopCb;
                    if (script.parentNode) script.parentNode.removeChild(script);
                    reject(new Error('Error JSONP'));
                };
                script.src = src;
                document.body.appendChild(script);
            });
        }

        function readJsonLs(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return [];
                const arr = JSON.parse(raw);
                return Array.isArray(arr) ? arr : [];
            } catch (_) {
                return [];
            }
        }

        function pillForEstado(e) {
            const x = String(e || '').toLowerCase();
            if (x === 'subido') return '<span class="hist-pill hist-pill-ok">subido</span>';
            if (x === 'pendiente') return '<span class="hist-pill hist-pill-pend">pendiente</span>';
            return '<span class="hist-pill hist-pill-stop">' + (x || 'otro') + '</span>';
        }

        function escHistText(s) {
            return String(s ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function histRowMainHtml(numGlobal, linea1, numMuestra) {
            return ''
                + '<div class="hist-row-main">'
                + '<span class="hist-row-kicker">' + escHistText(linea1) + '</span>'
                + '<span class="hist-row-muestra">N° muestra: <b>' + escHistText(numMuestra || '--') + '</b></span>'
                + '</div>';
        }

        function totalPaginasHistorial(total) {
            return Math.max(1, Math.ceil(Math.max(0, total) / HIST_PER_PAGE));
        }

        function acotarPaginaHistorial(page, totalItems) {
            const maxPage = Math.max(0, totalPaginasHistorial(totalItems) - 1);
            return Math.min(Math.max(0, page), maxPage);
        }

        function renderPaginacionHistorial(navId, page, totalItems, onPageChange) {
            const nav = document.getElementById(navId);
            if (!nav) return;
            const totalPages = totalPaginasHistorial(totalItems);
            if (totalItems <= HIST_PER_PAGE) {
                nav.hidden = true;
                nav.innerHTML = '';
                return;
            }
            const safePage = acotarPaginaHistorial(page, totalItems);
            const inicio = safePage * HIST_PER_PAGE + 1;
            const fin = Math.min(totalItems, (safePage + 1) * HIST_PER_PAGE);
            nav.hidden = false;
            nav.innerHTML = ''
                + '<button type="button" class="hist-page-btn" data-hist-page-dir="prev"'
                + (safePage <= 0 ? ' disabled' : '') + '>Anterior</button>'
                + '<span class="hist-page-info">' + inicio + '–' + fin + ' de ' + totalItems
                + ' · Pág. ' + (safePage + 1) + '/' + totalPages + '</span>'
                + '<button type="button" class="hist-page-btn" data-hist-page-dir="next"'
                + (safePage >= totalPages - 1 ? ' disabled' : '') + '>Siguiente</button>';
            nav.querySelectorAll('[data-hist-page-dir]').forEach((btn) => {
                btn.onclick = () => {
                    const dir = btn.getAttribute('data-hist-page-dir');
                    if (dir === 'prev' && safePage > 0) onPageChange(safePage - 1);
                    if (dir === 'next' && safePage < totalPages - 1) onPageChange(safePage + 1);
                };
            });
        }

        function pintarListaServidor() {
            const box = document.getElementById('server-list');
            if (!box) return;
            histServerPage = acotarPaginaHistorial(histServerPage, histServerRows.length);
            if (!histServerRows.length) {
                box.innerHTML = '<div class="hist-empty">Sin registros devueltos por GET.</div>';
                renderPaginacionHistorial('server-pagination', 0, 0, () => {});
                return;
            }
            const start = histServerPage * HIST_PER_PAGE;
            const pageRows = histServerRows.slice(start, start + HIST_PER_PAGE);
            box.innerHTML = pageRows.map((r, idx) => {
                const n = start + idx + 1;
                const linea1 = '#' + n + ' · Fecha: ' + (r.fecha || '--');
                return ''
                    + '<div class="hist-row">'
                    + '<div class="hist-row-text">'
                    + histRowMainHtml(n, linea1, r.num_muestra)
                    + '<div class="hist-row-sub">Total filas: ' + escHistText(r.total)
                    + ' · Ensayo(s): ' + escHistText(r.ensayos.length ? r.ensayos.join(', ') : '--') + '</div>'
                    + '</div>'
                    + '<span class="hist-pill hist-pill-ok">registrado</span>'
                    + '</div>';
            }).join('');
            renderPaginacionHistorial('server-pagination', histServerPage, histServerRows.length, (p) => {
                histServerPage = p;
                pintarListaServidor();
            });
        }

        function pintarListaLocal() {
            const box = document.getElementById('local-list');
            if (!box) return;
            histLocalPage = acotarPaginaHistorial(histLocalPage, histLocalRows.length);
            if (!histLocalRows.length) {
                box.innerHTML = '<div class="hist-empty">Sin elementos en cola local.</div>';
                renderPaginacionHistorial('local-pagination', 0, 0, () => {});
                return;
            }
            const start = histLocalPage * HIST_PER_PAGE;
            const pageRows = histLocalRows.slice(start, start + HIST_PER_PAGE);
            box.innerHTML = pageRows.map((r, idx) => {
                const n = start + idx + 1;
                const linea1 = '#' + n + ' · ' + (r.ensayo || 'Ensayo');
                const sub = (r.fecha || '--') + ' · intentos: ' + r.intentos
                    + (r.error ? ' · motivo: ' + r.error : '');
                return ''
                    + '<div class="hist-row">'
                    + '<div class="hist-row-text">'
                    + histRowMainHtml(n, linea1, r.num_muestra)
                    + '<div class="hist-row-sub">' + escHistText(sub) + '</div>'
                    + '</div>'
                    + pillForEstado(r.estado)
                    + '</div>';
            }).join('');
            renderPaginacionHistorial('local-pagination', histLocalPage, histLocalRows.length, (p) => {
                histLocalPage = p;
                pintarListaLocal();
            });
        }

        function renderServer(registrados) {
            const list = Array.isArray(registrados) ? registrados.slice(0) : [];
            const grouped = {};
            list.forEach((r) => {
                const fecha = String(r?.fecha || '').trim();
                const num = String(r?.num_muestra || '').trim();
                if (!fecha || !num) return;
                const key = fecha + '||' + num;
                if (!grouped[key]) {
                    grouped[key] = {
                        fecha: fecha,
                        num_muestra: num,
                        total: 0,
                        ensayos: new Set()
                    };
                }
                grouped[key].total += 1;
                const en = String(r?.ensayo_numero || '').trim();
                if (en) grouped[key].ensayos.add(en);
            });
            const view = Object.values(grouped).map((g) => ({
                fecha: g.fecha,
                num_muestra: g.num_muestra,
                total: g.total,
                ensayos: [...g.ensayos].sort((a, b) => Number(a) - Number(b))
            })).sort((a, b) => {
                const f = String(b.fecha || '').localeCompare(String(a.fecha || ''));
                if (f !== 0) return f;
                return String(a.num_muestra || '').localeCompare(String(b.num_muestra || ''));
            });

            document.getElementById('kpi-servidor').textContent = String(view.length);
            histServerRows = view;
            histServerPage = 0;
            pintarListaServidor();
        }

        function renderLocal() {
            const queue = readJsonLs(SYNC_QUEUE_KEY);
            const hist = readJsonLs(SYNC_HISTORY_KEY);
            const byUid = {};
            hist.forEach((h) => { if (h && h.uid) byUid[h.uid] = h; });
            const rows = queue.map((q) => {
                const events = hist.filter((h) => h && h.uid && q && q.uid && h.uid === q.uid);
                const last = events.length ? events[events.length - 1] : (q && q.uid ? byUid[q.uid] : null);
                return {
                    uid: q?.uid || '',
                    fecha: q?.fecha || '',
                    ensayo: q?.ensayo || '',
                    num_muestra: q?.num_muestra || '',
                    estado: (last?.estado || q?.estado || '').toLowerCase(),
                    error: last?.error || q?.error || '',
                    intentos: Number(last?.intentos || q?.intentos || 0),
                    ts: Number(last?.ts || q?.actualizado_en || q?.creado_en || 0)
                };
            });
            const pendientes = rows.filter((r) => r.estado === 'pendiente').length;
            const bloqueados = rows.filter((r) => r.estado && r.estado !== 'pendiente' && r.estado !== 'subido').length;
            document.getElementById('kpi-pendientes').textContent = String(pendientes);
            document.getElementById('kpi-bloqueados').textContent = String(bloqueados);
            actualizarHeaderHistorial();

            histLocalRows = rows.slice(0).sort((a, b) => (b.ts || 0) - (a.ts || 0));
            histLocalPage = 0;
            pintarListaLocal();
        }

        async function initHistorial() {
            actualizarHeaderHistorial();
            renderLocal();
            try {
                const r = await cbJsonp(API_URL, { listado_registrados: '1' });
                if (!r || r.ok !== true) throw new Error('Respuesta inválida');
                renderServer(r.registrados || []);
            } catch (_) {
                document.getElementById('server-list').innerHTML = '<div class="hist-empty">No se pudo consultar servidor en este momento.</div>';
            }
        }

        initHistorial();
    </script>
</body>
</html>
